[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

# Verification: Blockscout on Arc Testnet
# forge verify-contract <addr> <path:name> --chain-id 5042002 \
#   --verifier blockscout --verifier-url https://testnet.arcscan.app/api/

